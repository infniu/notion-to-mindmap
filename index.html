function buildTree(raw, parent, depth) {

  const toHex = v => v.toString(16).padStart(2,"0");
  return "#" + toHex(r) + toHex(g) + toHex(b);

  n.subtreeH = Math.max(NODE_H, total);

function positionNode(n, x, yCenter) {

function collapseToLevel(n, maxLevel) {
  const allCh = n._children || n.children;
  if (n.depth < maxLevel) {

    for (const c of n.children) collapseToLevel(c, maxLevel);

      n._children = allCh; n.children = []; n.expanded = false;
    }
  }
}

  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(zoom, zoom);
  ctx.translate(-camX, -camY);
  drawLinks(rootNode);
  drawNodes(rootNode);
  drawSearchHighlights();
  ctx.restore();
  document.getElementById("zoom-indicator").textContent = Math.round(zoom * 100) + "%";
}

function drawLinks(n) {
  for (const c of n.children) {
    const x1 = n.x + n.w, y1 = n.y;
    const x2 = c.x, y2 = c.y;
    const cpx = (x1 + x2) / 2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.bezierCurveTo(cpx, y1, cpx, y2, x2, y2);
    ctx.strokeStyle = c.branchColor || "#555";
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = Math.max(1, 2.5 - n.depth * 0.3);
    ctx.stroke();
    ctx.globalAlpha = 1;
    drawLinks(c);
  }
}

function drawNodes(n) {
  const isLeaf = !hasAnyChildren(n);
  const nh = NODE_H, nx = n.x, ny = n.y - nh / 2;
  if (!isLeaf) {
    ctx.beginPath();
    roundRect(ctx, nx, ny, n.w, nh, 6);
    ctx.fillStyle = n.branchColor || "#667eea";
    ctx.globalAlpha = n.depth === 0 ? 0.3 : 0.15;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = n.branchColor || "#667eea";
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.6;
    ctx.stroke();
    ctx.globalAlpha = 1;
  } else {
    ctx.beginPath();
    ctx.moveTo(nx, n.y + nh/2 - 1);
    ctx.lineTo(nx + n.w, n.y + nh/2 - 1);
    ctx.strokeStyle = n.branchColor || "#555";
    ctx.globalAlpha = 0.25;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.font = n.depth <= 1 ? FONT_BOLD : FONT;
  ctx.fillStyle = n.branchColor || "#e0e0e0";
  ctx.globalAlpha = isLeaf ? 0.85 : 1;
  ctx.textBaseline = "middle";
  ctx.fillText(n.title, nx + NODE_PAD_X, n.y);
  ctx.globalAlpha = 1;
  if (hasAnyChildren(n)) {
    ctx.font = "10px sans-serif";
    ctx.fillStyle = n.branchColor || "#888";
    ctx.globalAlpha = 0.7;
    ctx.fillText(n.expanded ? "\u25C0" : "\u25B6", nx + n.w - 16, n.y);
    ctx.globalAlpha = 1;
  }
  for (const c of n.children) drawNodes(c);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

let searchResults = [];
let searchIdx = -1;

function doSearch(query) {
  searchResults = []; searchIdx = -1;
  if (!query) { render(); return; }
  const q = query.toLowerCase();
  for (const n of nodes) { if (n.title.toLowerCase().includes(q)) searchResults.push(n); }
  if (searchResults.length > 0) {
    searchIdx = 0;
    collapseAllExceptPaths(searchResults);
    for (const r of searchResults) { expandPathTo(r); }
    layout(rootNode);
    focusOnNode(searchResults[0]);
  }
  render();
}

function collapseAllExceptPaths(results) {
  const pathNodes = new Set();
  for (const r of results) {
    let cur = r.parent;
    while (cur) { pathNodes.add(cur); cur = cur.parent; }
    pathNodes.add(r);
  }
  function walk(n) {
    if (!pathNodes.has(n)) {
      const allCh = n._children || n.children;
      if (allCh.length > 0 && n.children.length > 0) {
        n._children = n.children; n.children = []; n.expanded = false;
      }
    }
    const ch = n._children || n.children;
    for (const c of ch) walk(c);
  }
  walk(rootNode);
}

function expandPathTo(n) {
  const path = [];
  let cur = n.parent;
  while (cur) { path.unshift(cur); cur = cur.parent; }
  for (const p of path) { if (p._children) { p.children = p._children; p._children = null; p.expanded = true; } }
}

function drawSearchHighlights() {
  for (let i = 0; i < searchResults.length; i++) {
    const n = searchResults[i];
    ctx.beginPath();
    roundRect(ctx, n.x - 2, n.y - NODE_H/2 - 2, n.w + 4, NODE_H + 4, 8);
    ctx.strokeStyle = i === searchIdx ? "#ffd700" : "#ffa500";
    ctx.lineWidth = i === searchIdx ? 3 : 1.5;
    ctx.globalAlpha = i === searchIdx ? 1 : 0.6;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function nextSearchResult() {
  if (searchResults.length === 0) return;
  searchIdx = (searchIdx + 1) % searchResults.length;
  collapseAllExceptPaths(searchResults);
  for (const r of searchResults) { expandPathTo(r); }
  layout(rootNode);
  focusOnNode(searchResults[searchIdx]);
  render();
}

let dragging = false;
let dragStartX, dragStartY, camStartX, camStartY;
let hoveredNode = null;
let ctxTarget = null;

function hitTest(sx, sy) {
  const wx = (sx - W/2) / zoom + camX;
  const wy = (sy - H/2) / zoom + camY;
  return hitTestNode(rootNode, wx, wy);
}

function hitTestNode(n, wx, wy) {
  const nh = NODE_H;
  if (wx >= n.x && wx <= n.x + n.w && wy >= n.y - nh/2 && wy <= n.y + nh/2) return n;
  for (const c of n.children) { const r = hitTestNode(c, wx, wy); if (r) return r; }
  return null;
}

function focusOnNode(n) {
  camX = n.x + n.w / 2;
  camY = n.y;
  zoom = 1.0;
  render();
}

function fitScreen() {
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  function walk(n) {
    minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x + n.w);
    minY = Math.min(minY, n.y - NODE_H/2); maxY = Math.max(maxY, n.y + NODE_H/2);
    for (const c of n.children) walk(c);
  }
  walk(rootNode);
  const tw = maxX - minX, th = maxY - minY;
  if (tw <= 0 || th <= 0) return;
  zoom = Math.min((W - 80) / tw, (H - 80) / th, 2);
  camX = minX + tw / 2;
  camY = minY + th / 2;
  render();
}

const tooltip = document.getElementById("tooltip");
function showTooltip(n, sx, sy) {
  if (!hasAnyChildren(n)) { tooltip.style.display = "none"; return; }
  const allCh = n._children || n.children;
  tooltip.textContent = n.depth === 0 ? allCh.length + " 个一级页面" : countDesc(n) + " 个子页面";
  tooltip.style.display = "block";
  tooltip.style.left = (sx + 12) + "px";
  tooltip.style.top = (sy - 28) + "px";
}

function init() {
  cvs = document.getElementById("cv");
  ctx = cvs.getContext("2d");
  mCtx = document.createElement("canvas").getContext("2d");
  resize();
  window.addEventListener("resize", () => { resize(); layout(rootNode); render(); });
  rootNode = buildTree(RAW, null, 0);
  assignColors(rootNode);
  layout(rootNode);
  updateStats();
  camX = rootNode.x + rootNode.w / 2 + 200;
  camY = rootNode.y;
  zoom = 1.0;
  render();

  const wrap = document.getElementById("canvas-wrap");
  wrap.addEventListener("mousedown", (e) => {
    if (e.button === 0) {
      dragging = true;
      dragStartX = e.clientX; dragStartY = e.clientY;
      camStartX = camX; camStartY = camY;
      wrap.classList.add("grabbing");
    }
  });
  window.addEventListener("mousemove", (e) => {
    if (dragging) {
      camX = camStartX - (e.clientX - dragStartX) / zoom;
      camY = camStartY - (e.clientY - dragStartY) / zoom;
      render();
    } else {
      const rect = cvs.getBoundingClientRect();
      const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      const n = hitTest(sx, sy);
      if (n !== hoveredNode) {
        hoveredNode = n;
        cvs.style.cursor = n ? "pointer" : "";
        if (n) showTooltip(n, e.clientX, e.clientY);
        else tooltip.style.display = "none";
        render();
      } else if (n) {
        tooltip.style.left = (e.clientX + 12) + "px";
        tooltip.style.top = (e.clientY - 28) + "px";
      }
    }
  });
  window.addEventListener("mouseup", (e) => {
    if (!dragging) return;
    dragging = false;
    wrap.classList.remove("grabbing");
    const moved = Math.abs(e.clientX - dragStartX) + Math.abs(e.clientY - dragStartY);
    if (moved < 4 && e.button === 0) {
      const rect = cvs.getBoundingClientRect();
      const n = hitTest(e.clientX - rect.left, e.clientY - rect.top);
      if (n) {
        if (e.ctrlKey || e.metaKey) { if (n.link) window.open(n.link, "_blank"); }
        else { const ox = n.x, oy = n.y; toggleNode(n); camX += n.x - ox; camY += n.y - oy; render(); }
      }
    }
  });
  wrap.addEventListener("wheel", (e) => {
    e.preventDefault();
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const wx = (mx - W/2) / zoom + camX, wy = (my - H/2) / zoom + camY;
    const newZoom = Math.max(0.05, Math.min(4, zoom + (e.deltaY > 0 ? -0.05 : 0.05)));
    camX = wx - (mx - W/2) / newZoom;
    camY = wy - (my - H/2) / newZoom;
    zoom = newZoom;
    render();
  }, { passive: false });
  wrap.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    const rect = cvs.getBoundingClientRect();
    const n = hitTest(e.clientX - rect.left, e.clientY - rect.top);
    if (n) {
      ctxTarget = n;
      const menu = document.getElementById("ctx-menu");
      document.getElementById("ctx-copy").style.display = n.link ? "" : "none";
      menu.style.display = "block";
      menu.style.left = e.clientX + "px";
      menu.style.top = e.clientY + "px";
      const mr = menu.getBoundingClientRect();
      if (mr.right > window.innerWidth) menu.style.left = (e.clientX - mr.width) + "px";
      if (mr.bottom > window.innerHeight) menu.style.top = (e.clientY - mr.height) + "px";
    }
  });
  document.addEventListener("click", () => { document.getElementById("ctx-menu").style.display = "none"; });
  document.getElementById("ctx-copy").addEventListener("click", () => {
    if (ctxTarget && ctxTarget.link) navigator.clipboard.writeText(ctxTarget.link).catch(() => prompt("Copy:", ctxTarget.link));
  });
  document.getElementById("ctx-focus").addEventListener("click", () => { if (ctxTarget) focusOnNode(ctxTarget); });
  document.getElementById("btn-reset").addEventListener("click", () => {
    collapseToLevel(rootNode, 2);
    layout(rootNode);
    camX = rootNode.x + rootNode.w / 2 + 200;
    camY = rootNode.y;
    zoom = 1.0;
    render();
  });
  document.getElementById("btn-fit").addEventListener("click", fitScreen);
  document.getElementById("btn-expand").addEventListener("click", () => { expandAll(rootNode); layout(rootNode); fitScreen(); });
  document.getElementById("btn-collapse").addEventListener("click", () => { collapseToLevel(rootNode, 1); layout(rootNode); fitScreen(); });
  const searchBox = document.getElementById("search-box");
  searchBox.addEventListener("input", () => doSearch(searchBox.value));
  searchBox.addEventListener("keydown", (e) => {
    if (e.key === "Enter") nextSearchResult();
    if (e.key === "Escape") { searchBox.value = ""; searchResults = []; searchIdx = -1; searchBox.blur(); render(); }
  });
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "f") { e.preventDefault(); searchBox.focus(); searchBox.select(); }
  });
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight - 48;
  cvs.width = W * dpr;
  cvs.height = H * dpr;
  cvs.style.width = W + "px";
  cvs.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function updateStats() {
  let maxD = 0;
  for (const n of nodes) if (n.depth > maxD) maxD = n.depth;
  document.getElementById("stats").textContent = nodes.length + " 个页面 | 最大 " + maxD + " 层";
}

window.addEventListener("DOMContentLoaded", init);
</script>
